services:
  frontend:
    build:
      context: ../pangandaran-ai_chatbot
      dockerfile: Dockerfile
      args:
        - BACKEND_URL=https://dramatically-dodge-odds-tape.trycloudflare.com
    container_name: chatbot-frontend
    ports:
      - "3000:3000"
    environment:
      - BACKEND_URL=https://dramatically-dodge-odds-tape.trycloudflare.com
    restart: unless-stopped
